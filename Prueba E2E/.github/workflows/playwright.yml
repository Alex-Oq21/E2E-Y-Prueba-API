name: Playwright Screenplay CI


on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  automation-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar el entorno de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/* 
        cache: 'npm'

    - name: 3. Instalar dependencias del proyecto
      run: npm ci

    - name: 4. Instalar los navegadores de Playwright
      run: npx playwright install --with-deps chromium

    - name: 5. Ejecutar las pruebas de Screenplay
      run: npx playwright test
      env:
        CI: true 

    - name: 6. Guardar y publicar el Reporte HTML
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30